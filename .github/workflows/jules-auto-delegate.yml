name: Auto-delegate to Jules

# Review-gated AFK automation. When a maintainer triages an issue with the
# `ready-for-agent` label, this triggers Google Jules to work the issue and open
# a PR. The PR still waits for human review before merge â€” Jules opens PRs, it
# never merges to main, so review-gating holds by default.
#
# Trigger mechanism â€” PAT-applied `jules` label (NOT the jules-action API):
#   - Jules ignores label events authored by a bot (github-actions[bot]), so a
#     workflow adding the `jules` label with github.token silently dead-ends.
#   - The jules-action API path was tried (PR #59) but its alpha sessions are
#     created yet never deliver a PR (verified: sessions 13222017034551546799,
#     1381979756652838667 both stalled with no PR over 15â€“18 min).
#   - The label path applied by a *user* works reliably and fast (verified the
#     same day: #66 â†’ ack 75s â†’ PR #68 in ~12 min).
#   So we apply the `jules` label using a user-owned PAT (JULES_LABEL_PAT): the
#   label event is attributed to the PAT owner (a user), and Jules' reliable
#   labelâ†’taskâ†’PR path fires. See docs/adr/0004-afk-agent-delegation-loop.md.
#
# Security: GitHub only lets users with write/triage access apply labels, so
# applying `ready-for-agent` is collaborator-gated even though this repo is
# public. A stranger opening an issue cannot trigger this â€” they can't label.
#
# Governance (Demerzel): delegation is gated on a cloud-readable halt marker,
# `governance/state/afk-halt.json`. Demerzel's local `~/.demerzel/HALT-ALL`
# marker can't reach a GitHub-hosted workflow, so this repo-committed marker is
# the AFK loop's equivalent kill switch. Present + unexpired => delegation is
# paused (the `ready-for-agent` label is kept, and the issue gets a comment).
# Absent => the loop runs. See docs/adr/0004-afk-agent-delegation-loop.md.
#
# Requires the JULES_LABEL_PAT secret: a fine-grained PAT with Issues: write on
# this repo. Takes effect only once this file is on the default branch (main);
# `issues` events always run the workflow version from the default branch.

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  delegate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.label.name == 'ready-for-agent' }}
    steps:
      - name: Checkout (read the governance halt marker)
        uses: actions/checkout@v4

      - name: Governance halt-gate + preflight
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          HAS_PAT: ${{ secrets.JULES_LABEL_PAT != '' }}
        run: |
          MARKER="governance/state/afk-halt.json"
          if [ -f "$MARKER" ]; then
            # Honor an optional expires_at (RFC3339); absent => indefinite halt.
            EXPIRES=$(jq -r '.expires_at // empty' "$MARKER" 2>/dev/null || true)
            HALTED=true
            if [ -n "$EXPIRES" ]; then
              NOW=$(date -u +%s)
              EXP=$(date -u -d "$EXPIRES" +%s 2>/dev/null || echo 0)
              if [ "$EXP" -gt 0 ] && [ "$NOW" -ge "$EXP" ]; then
                HALTED=false
                echo "::notice::afk-halt marker present but expired ($EXPIRES) â€” proceeding"
              fi
            fi
            if [ "$HALTED" = "true" ]; then
              REASON=$(jq -r '.reason // "no reason given"' "$MARKER" 2>/dev/null || echo "no reason given")
              BY=$(jq -r '.halted_by // "Demerzel"' "$MARKER" 2>/dev/null || echo "Demerzel")
              gh issue comment "$ISSUE" --repo "$REPO" --body "âŹ¸ď¸Ź AFK delegation is **halted by governance** (\`$MARKER\`, by $BY): $REASON. The \`ready-for-agent\` label is kept; re-apply it after resume to delegate."
              echo "::notice::AFK delegation halted by governance marker â€” skipping issue #${ISSUE}"
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if [ "$HAS_PAT" != "true" ]; then
            gh issue comment "$ISSUE" --repo "$REPO" --body "âš ď¸Ź AFK delegation is configured but the \`JULES_LABEL_PAT\` secret is not set, so Jules was not triggered. Add a fine-grained PAT with Issues: write as \`JULES_LABEL_PAT\` and re-apply the \`ready-for-agent\` label."
            echo "::warning::JULES_LABEL_PAT not configured â€” skipping issue #${ISSUE}"
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Delegate to Jules (apply `jules` label via PAT, so Jules sees a user-attributed event)
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.JULES_LABEL_PAT }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE" --repo "$REPO" --add-label jules
          echo "Delegated issue #${ISSUE} to Jules via the \`jules\` label (PAT-attributed)."
