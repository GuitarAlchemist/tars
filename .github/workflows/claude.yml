name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      contains(github.event.comment.body, '@claude') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    steps:
      # Required: the action's branch setup runs git against the workspace and
      # fails with "not a git repository" without a checkout (run 28550132148).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Subscription OAuth token ($0/call), never the pay-per-use ANTHROPIC_API_KEY.
          # Set org-wide via: claude setup-token && gh secret set CLAUDE_CODE_OAUTH_TOKEN --org GuitarAlchemist
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
