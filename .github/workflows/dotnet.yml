# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
      working-directory: v2
    - name: Build
      run: dotnet build --no-restore
      working-directory: v2
    - name: Test
      # Exclude the deliberate self-improve backlog (ADR 0002 D5): those tests are
      # intentionally RED capability-gap seeds for the self-hosting loop to close,
      # not regressions. See v2/self-improve-backlog.json.
      run: dotnet test --no-build --verbosity normal --filter "Category!=SelfImproveBacklog"
      working-directory: v2
