name: Jules PR Watchdog

on:
  pull_request:
    types: [synchronize, opened, reopened]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  workflow_run:
    workflows: ["CI"] # Adjust based on actual CI workflow name
    types: [completed]
  schedule:
    - cron: '0 0 * * *' # Daily check for stale PRs

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Governance halt-gate check
        id: gate
        run: |
          MARKER="governance/state/afk-halt.json"
          # Watchdog can still label/update state, but shouldn't trigger new Jules runs if halted
          if [ -f "$MARKER" ]; then
            EXPIRES=$(jq -r '.expires_at // empty' "$MARKER" 2>/dev/null || true)
            HALTED=true
            if [ -n "$EXPIRES" ]; then
              NOW=$(date -u +%s)
              EXP=$(date -u -d "$EXPIRES" +%s 2>/dev/null || echo 0)
              if [ "$EXP" -gt 0 ] && [ "$NOW" -ge "$EXP" ]; then
                HALTED=false
                echo "::notice::afk-halt marker present but expired ($EXPIRES) — proceeding"
              fi
            fi
            if [ "$HALTED" = "true" ]; then
              echo "::notice::AFK delegation halted by governance marker — watchdog will only update read-only state."
              echo "halted=true" >> "$GITHUB_OUTPUT"
            else
              echo "halted=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "halted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Process PR Watchdog State
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HALTED: ${{ steps.gate.outputs.halted }}
        run: |
          echo "Processing event: ${{ github.event_name }}"
          # Future implementation:
          # 1. Fetch PR details.
          # 2. Check if PR was created by Jules.
          # 3. Determine state transition based on event.
          # 4. Apply new labels (jules-waiting, jules-updated, needs-human-review, etc.).
          # 5. Leave comments ONLY for major transitions (stale, duplicate).
          echo "Watchdog workflow design draft executed."
