# TARS SUPERINTELLIGENCE DEPLOYMENT - BLUE/GREEN STRATEGY
# Complete Tier 1-11 superintelligence with production-ready infrastructure
# Zero tolerance for simulations - all capabilities are real

version: '3.8'

services:
  # ===== BLUE ENVIRONMENT (PRODUCTION) =====
  
  # TARS Superintelligence Core - Blue (Production)
  tars-superintelligence-blue:
    build:
      context: .
      dockerfile: Dockerfile.superintelligence
      target: production
    container_name: tars-superintelligence-blue
    hostname: tars-blue
    environment:
      - TARS_ENVIRONMENT=Production
      - TARS_DEPLOYMENT_COLOR=Blue
      - TARS_SUPERINTELLIGENCE_TIER=11
      - TARS_TIER_1_AUTONOMY=true
      - TARS_TIER_2_MODIFICATION=true
      - TARS_TIER_3_MULTIAGENT=true
      - TARS_TIER_4_EMERGENT=true
      - TARS_TIER_5_RECURSIVE=true
      - TARS_TIER_6_COLLECTIVE=true
      - TARS_TIER_7_DECOMPOSITION=true
      - TARS_TIER_8_REFLECTIVE=true
      - TARS_TIER_9_SANDBOX=true
      - TARS_TIER_10_METALEARNING=true
      - TARS_TIER_11_SELFAWARE=true
      - MONGODB_CONNECTION=mongodb://tars_app:tars_secure_2024@mongodb:27017/tars_knowledge
      - CHROMADB_URL=http://chromadb:8000
      - REDIS_CONNECTION=redis:6379
      - TARS_CUDA_ENABLED=true
      - DOTNET_ENVIRONMENT=Production
    ports:
      - "8080:8080"  # Main API
      - "8081:8081"  # Superintelligence API
      - "8082:8082"  # Health checks
    volumes:
      - tars_superintelligence_blue:/app/data
      - tars_logs_blue:/app/logs
      - tars_models:/app/models:ro
      - /var/run/docker.sock:/var/run/docker.sock  # For autonomous operations
    depends_on:
      - mongodb
      - chromadb
      - redis
      - prometheus
    networks:
      - tars-superintelligence
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health/superintelligence"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ===== GREEN ENVIRONMENT (STAGING) =====
  
  # TARS Superintelligence Core - Green (Staging)
  tars-superintelligence-green:
    build:
      context: .
      dockerfile: Dockerfile.superintelligence
      target: staging
    container_name: tars-superintelligence-green
    hostname: tars-green
    environment:
      - TARS_ENVIRONMENT=Staging
      - TARS_DEPLOYMENT_COLOR=Green
      - TARS_SUPERINTELLIGENCE_TIER=11
      - TARS_TIER_1_AUTONOMY=true
      - TARS_TIER_2_MODIFICATION=true
      - TARS_TIER_3_MULTIAGENT=true
      - TARS_TIER_4_EMERGENT=true
      - TARS_TIER_5_RECURSIVE=true
      - TARS_TIER_6_COLLECTIVE=true
      - TARS_TIER_7_DECOMPOSITION=true
      - TARS_TIER_8_REFLECTIVE=true
      - TARS_TIER_9_SANDBOX=true
      - TARS_TIER_10_METALEARNING=true
      - TARS_TIER_11_SELFAWARE=true
      - MONGODB_CONNECTION=mongodb://tars_app:tars_secure_2024@mongodb:27017/tars_knowledge_staging
      - CHROMADB_URL=http://chromadb:8000
      - REDIS_CONNECTION=redis:6379
      - TARS_CUDA_ENABLED=true
      - DOTNET_ENVIRONMENT=Staging
    ports:
      - "8090:8080"  # Staging API
      - "8091:8081"  # Staging Superintelligence API
      - "8092:8082"  # Staging Health checks
    volumes:
      - tars_superintelligence_green:/app/data
      - tars_logs_green:/app/logs
      - tars_models:/app/models:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mongodb
      - chromadb
      - redis
    networks:
      - tars-superintelligence
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health/superintelligence"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # ===== LOAD BALANCER & TRAFFIC MANAGEMENT =====
  
  # Nginx Load Balancer with Blue/Green switching
  tars-load-balancer:
    image: nginx:alpine
    container_name: tars-load-balancer
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/blue-green.conf:/etc/nginx/conf.d/blue-green.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - tars-superintelligence-blue
      - tars-superintelligence-green
    networks:
      - tars-superintelligence
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== INFRASTRUCTURE SERVICES =====
  
  # MongoDB - Knowledge Storage
  mongodb:
    image: mongo:7.0
    container_name: tars-mongodb-superintelligence
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=tars_admin
      - MONGO_INITDB_ROOT_PASSWORD=tars_secure_2024
      - MONGO_INITDB_DATABASE=tars_knowledge
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./mongodb/init-superintelligence.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - tars-superintelligence
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ChromaDB - Vector Storage
  chromadb:
    image: chromadb/chroma:latest
    container_name: tars-chromadb-superintelligence
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    networks:
      - tars-superintelligence
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis - Caching & Coordination
  redis:
    image: redis:7-alpine
    container_name: tars-redis-superintelligence
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    networks:
      - tars-superintelligence
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== MONITORING & OBSERVABILITY =====
  
  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: tars-prometheus-superintelligence
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-superintelligence.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - tars-superintelligence

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: tars-grafana-superintelligence
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=tars_superintelligence_2024
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - tars-superintelligence

volumes:
  # Blue environment
  tars_superintelligence_blue:
    driver: local
  tars_logs_blue:
    driver: local
  
  # Green environment  
  tars_superintelligence_green:
    driver: local
  tars_logs_green:
    driver: local
  
  # Shared volumes
  tars_models:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  chromadb_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  tars-superintelligence:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
