# TARS v2 QA Infrastructure Stack
# Running on distinct ports to avoid conflict with Dev stack
name: tars_v2_qa

services:
  chroma:
    image: chromadb/chroma:latest
    container_name: tars_qa_chroma
    ports:
      - "8010:8000"
    volumes:
      - tars_qa_chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  neo4j:
    image: neo4j:5.26.2
    container_name: tars_qa_neo4j
    ports:
      - "7475:7474"  # HTTP
      - "7688:7687"  # Bolt
    volumes:
      - tars_qa_neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/tars_password
      - NEO4J_PLUGINS=["apoc"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  graphiti:
    image: zepai/graphiti:latest
    container_name: tars_qa_graphiti
    ports:
      - "8002:8000" # Mapped to 8002
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - OPENAI_API_BASE=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OPENAI_API_KEY=sk-dummy-key-for-ollama-compatibility
      - MODEL_NAME=qwen2.5-coder:1.5b
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=tars_password
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')"]
      interval: 10s
      timeout: 5s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  tars_qa_neo4j_data:
  tars_qa_chroma_data:
