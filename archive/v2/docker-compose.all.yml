version: '3.8'

services:
  # ==========================================
  # INTERNAL INFRASTRUCTURE
  # ==========================================

  postgres:
    image: pgvector/pgvector:pg17
    container_name: tars_v2_postgres
    ports: [ "5432:5432" ]
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=tars_password
      - POSTGRES_DB=tars_memory
    volumes: [ "tars_v2_postgres_data:/var/lib/postgresql/data" ]

  chroma:
    image: chromadb/chroma:latest
    container_name: tars_v2_chroma
    ports: [ "8000:8000" ]
    environment: [ "IS_PERSISTENT=TRUE" ]
    volumes: [ "tars_v2_chroma_data:/chroma/chroma" ]

  neo4j:
    image: neo4j:5.26.2
    container_name: tars_v2_neo4j
    ports: [ "7474:7474", "7687:7687" ]
    environment:
      - NEO4J_AUTH=neo4j/tars_password
      - NEO4J_PLUGINS=["apoc"]
    volumes: [ "tars_v2_neo4j_data:/data" ]

  graphiti:
    image: zepai/graphiti:latest
    container_name: tars_v2_graphiti
    ports: [ "8001:8000" ]
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=tars_password
      - OPENAI_API_BASE=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OPENAI_API_KEY=sk-dummy
      - MODEL_NAME=qwen2.5-coder:7b
    depends_on: [ "neo4j" ]

  # ==========================================
  # OBSERVABILITY STACK
  # ==========================================

  prometheus:
    image: prom/prometheus:latest
    container_name: tars_monitoring_prometheus
    ports: [ "9091:9090" ]
    volumes: [ "./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml" ]
    extra_hosts: [ "host.docker.internal:host-gateway" ]

  grafana:
    image: grafana/grafana:latest
    container_name: tars_monitoring_grafana
    ports: [ "3001:3000" ]
    environment: [ "GF_SECURITY_ADMIN_PASSWORD=tars_admin" ]
    depends_on: [ "prometheus" ]

volumes:
  tars_v2_postgres_data:
  tars_v2_chroma_data:
  tars_v2_neo4j_data:
