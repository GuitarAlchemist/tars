# TARS Superintelligence Blue/Green Deployment Configuration
upstream tars-superintelligence-blue {
    server tars-superintelligence-blue:8080 max_fails=3 fail_timeout=30s;
}

upstream tars-superintelligence-green {
    server tars-superintelligence-green:8080 max_fails=3 fail_timeout=30s;
}

# Default to blue (production) - superintelligence active
upstream tars-superintelligence-active {
    server tars-superintelligence-blue:8080 max_fails=3 fail_timeout=30s;
}

# Blue/Green switching logic
map $cookie_tars_instance $backend {
    default "tars-active";
    "blue" "tars-blue";
    "green" "tars-green";
}

server {
    listen 80;
    server_name localhost;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "TARS Proxy Healthy\n";
        add_header Content-Type text/plain;
    }

    # Blue/Green status endpoint
    location /deployment/status {
        access_log off;
        return 200 '{"active": "green", "blue": "available", "green": "active"}';
        add_header Content-Type application/json;
    }

    # Switch to blue instance
    location /deployment/switch/blue {
        add_header Set-Cookie "tars_instance=blue; Path=/; Max-Age=3600";
        return 302 /;
    }

    # Switch to green instance  
    location /deployment/switch/green {
        add_header Set-Cookie "tars_instance=green; Path=/; Max-Age=3600";
        return 302 /;
    }

    # Main TARS application
    location / {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for TARS chat
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Add deployment info headers
        add_header X-TARS-Instance $backend always;
        add_header X-TARS-Deployment "blue-green" always;
    }

    # API endpoints with load balancing
    location /api/ {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # API-specific headers
        add_header X-TARS-API-Version "2.0" always;
        add_header X-TARS-Instance $backend always;
    }

    # Chat endpoint with sticky sessions
    location /api/chat {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Maintain session affinity for chat
        proxy_set_header X-TARS-Session $cookie_tars_session;
        add_header X-TARS-Chat-Instance $backend always;
    }
}
