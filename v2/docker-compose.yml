# TARS v2 Infrastructure Stack
name: tars_v2

services:
  # Vector database for embeddings
  chroma:
    image: chromadb/chroma:latest
    container_name: tars_v2_chroma
    ports:
      - "8000:8000"
    volumes:
      - tars_chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    # Note: No healthcheck since chromadb image is minimal. Use http://localhost:8000/api/v2/heartbeat to verify.

  # Neo4j graph database for Graphiti
  neo4j:
    image: neo4j:5.26.2
    container_name: tars_v2_neo4j
    ports:
      - "7474:7474"  # HTTP browser
      - "7687:7687"  # Bolt protocol
    volumes:
      - tars_neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/tars_password
      - NEO4J_PLUGINS=["apoc"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Graphiti temporal knowledge graph server
  graphiti:
    image: zepai/graphiti:latest
    container_name: tars_v2_graphiti
    ports:
      - "8001:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      # Use Ollama for LLM (via OpenWebUI or direct)
      - OPENAI_API_BASE=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OPENAI_API_KEY=ollama  # Placeholder for Ollama compatibility
      - MODEL_NAME=llama3.1:latest
      # Neo4j connection
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=tars_password
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')"]
      interval: 10s
      timeout: 5s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  tars_neo4j_data:
  tars_chroma_data:
